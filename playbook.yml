---
- name: Configure Web Server
  hosts: all
  become: true
  tasks:
    - name: Install Docker
      apt:
        name: docker.io
        state: present
        update_cache: yes

    - name: Ensure Docker starts on boot
      service:
        name: docker
        state: started
        enabled: yes

    - name: Run Docker container
      docker_container:
        name: my_web_app
        image: nginx:alpine
        state: started
        ports:
          - "80:80"